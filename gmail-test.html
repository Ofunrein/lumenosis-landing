<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gmail Test Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background: #4285F4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>Form Test with Gmail</h1>
    <p>This form uses a Gmail address which is known to work reliably with FormSubmit.</p>
    
    <form id="gmail-test-form">
        <div>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="Test User" required>
        </div>
        
        <div>
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" value="martin@lumenosis.com" required>
        </div>
        
        <div>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required>This is a test message sent to a Gmail address.</textarea>
        </div>
        
        <button type="submit">Send Test Message to Gmail</button>
    </form>
    
    <div id="result" class="result" style="display:none;"></div>
    
    <script>
        document.getElementById('gmail-test-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            resultDiv.textContent = 'Sending message...';
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value,
                _subject: 'Test Submission to Gmail'
            };
            
            // Send to a testing Gmail account that works with FormSubmit
            fetch('https://formsubmit.co/ajax/ofunrein123@gmail.com', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success === "true" || data.success === true) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>Success! Email sent to Gmail</h3>
                        <p>This confirms FormSubmit is working correctly. If you're not receiving emails at martin@lumenosis.com, the issue is likely with:</p>
                        <ul>
                            <li>Your domain's email filters/spam settings</li>
                            <li>DNS configurations for your domain</li>
                            <li>DMARC/SPF policies blocking third-party senders</li>
                        </ul>
                        <p>Try checking with your email provider or domain host.</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>Error sending email</h3>
                        <p>The form service returned an error: ${JSON.stringify(data)}</p>
                    `;
                }
            })
            .catch(error => {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>Error sending email</h3>
                    <p>Error details: ${error.message}</p>
                `;
            });
        });
    </script>
</body>
</html>
