<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks for Contacting Lumenosis</title>
    <meta name="description" content="Thank you for contacting Lumenosis - AI Automation for Real Estate & Healthcare.">
    <meta name="author" content="Lumenosis">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .hero-pattern {
            background-image: radial-gradient(circle at 25% 50%, rgba(56, 182, 255, 0.1) 0%, transparent 50%);
        }
        
        /* Hide DeepSite credit badge */
        [class*="deepsite-credit"],
        [id*="deepsite-credit"],
        a[href*="deepsite.io"],
        a[href*="remix"],
        div[style*="position: fixed"][style*="bottom: 0"],
        div[style*="position: fixed"][style*="z-index: 9999"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body class="min-h-screen hero-pattern">
    <div class="flex items-center justify-center h-screen">
        <div class="text-center px-4 sm:px-6 lg:px-8">
            <div class="flex justify-center">
                <i class="fas fa-check-circle text-6xl text-green-500 mb-6"></i>
            </div>
            <h1 class="text-4xl font-extrabold sm:text-5xl mb-4">
                <span class="gradient-text">Thank You!</span>
            </h1>
            <p class="text-xl text-gray-300 max-w-2xl mx-auto mb-8">
                Your message has been sent successfully. We'll get back to you as soon as possible.
            </p>
            <div class="mt-8">
                <a href="index.html" class="inline-flex items-center justify-center px-8 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-white bg-indigo-600 hover:bg-indigo-700 transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i> Back to Homepage
                </a>
            </div>
            <div class="mt-6">
                <a href="https://calendly.com/lumenosis" target="_blank" rel="noopener" class="inline-flex items-center justify-center px-8 py-3 border border-transparent rounded-md shadow-sm text-base font-medium text-indigo-300 bg-gray-800 hover:bg-gray-700 transition-colors">
                    <i class="fas fa-calendar-alt mr-2"></i> Schedule a Meeting
                </a>
            </div>
        </div>
    </div>
</body>
</html>
